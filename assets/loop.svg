<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-label="One agent turn through Understudy: the agent works while a ledger records every edit and command; its finished claim must pass the stop gate's three checks; blocked turns loop back with the reason; passing turns reach you as evidence. Doctrine and drills support the loop.">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b949e"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d29922"/>
    </marker>
    <marker id="agr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #e6edf3; }
    .b { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 8; }
    .t { font-size: 15px; text-anchor: middle; font-weight: 600; }
    .m { fill: #8b949e; font-size: 12px; text-anchor: middle; }
    .s { fill: #8b949e; font-size: 11px; }
    .red { fill: #f85149; }
    .grn { fill: #3fb950; }
    .amb { fill: #d29922; }
    .blu { fill: #58a6ff; }
    .pur { fill: #bc8cff; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; text-anchor: middle; }
    .flow { stroke: #8b949e; stroke-width: 1.5; fill: none; }
  </style>

  <rect x="0" y="0" width="1120" height="560" rx="12" fill="#0d1117"/>

  <!-- ── blocked feedback loop (over the top) ── -->
  <path class="flow" d="M 830 70 V 36 H 305 V 102" stroke="#d29922" stroke-dasharray="6 4" marker-end="url(#ag)"/>
  <text class="m amb" x="566" y="28">blocked — the reason lands back in the agent’s context: run it · prove it · rewrite the ending</text>

  <!-- ── the turn (left to right) ── -->
  <rect class="b" x="40" y="108" width="110" height="64"/>
  <text class="t" x="95" y="134">you</text>
  <text class="m" x="95" y="154">state the goal</text>
  <line class="flow" x1="154" y1="140" x2="194" y2="140" marker-end="url(#a)"/>

  <rect class="b" x="200" y="108" width="210" height="64"/>
  <text class="t" x="305" y="134">agent works</text>
  <text class="m" x="305" y="154">reads · edits · runs</text>
  <line class="flow" x1="414" y1="140" x2="454" y2="140" marker-end="url(#a)"/>

  <rect class="b" x="460" y="108" width="190" height="64"/>
  <text class="t" x="555" y="134">claims done</text>
  <text class="mono red" x="555" y="154">“fixed — all good”</text>
  <line class="flow" x1="654" y1="140" x2="694" y2="140" marker-end="url(#a)"/>

  <!-- ── the stop gate ── -->
  <rect class="b" x="700" y="70" width="260" height="140" stroke="#d29922"/>
  <text class="t amb" x="830" y="96">STOP GATE</text>
  <text class="m" x="830" y="122">① related run after the last edit?</text>
  <text class="m" x="830" y="142">② final message: 13 slop checks</text>
  <text class="m" x="830" y="162">③ mock work sold as done?</text>
  <text class="s" x="830" y="188" text-anchor="middle">loop-safe: max 5 blocks per session</text>

  <!-- ── ledger feeds the gate ── -->
  <path class="flow" d="M 340 176 V 268 H 434" marker-end="url(#a)"/>
  <text class="s" x="352" y="228">every edit &amp; command</text>
  <rect class="b" x="440" y="240" width="190" height="56"/>
  <text class="t" x="535" y="263" font-size="14">ledger</text>
  <text class="m" x="535" y="282">the session’s receipts</text>
  <path class="flow" d="M 634 268 H 668 V 184 H 694" marker-end="url(#a)"/>

  <!-- ── pass path ── -->
  <line class="flow" x1="830" y1="212" x2="830" y2="274" stroke="#3fb950" marker-end="url(#agr)"/>
  <text class="s grn" x="842" y="248">pass</text>
  <rect class="b" x="700" y="280" width="260" height="64" stroke="#3fb950"/>
  <text class="mono grn" x="830" y="308">“fixed — 42 passed, 0 failed”</text>
  <text class="m" x="830" y="328">evidence attached, not asserted</text>
  <line class="flow" x1="964" y1="312" x2="994" y2="312" marker-end="url(#a)"/>
  <rect class="b" x="1000" y="280" width="104" height="64"/>
  <text class="t" x="1052" y="306" font-size="14">you review</text>
  <text class="m" x="1052" y="326">once</text>

  <!-- ── foundations ── -->
  <path class="flow" d="M 215 396 V 180" stroke="#58a6ff" stroke-dasharray="6 4" marker-end="url(#ab)"/>
  <text class="s blu" x="225" y="300">loaded at session start</text>
  <rect class="b" x="40" y="400" width="350" height="74" stroke-dasharray="6 4"/>
  <text class="t blu" x="215" y="428" font-size="14">doctrine — the contract, ~950 words</text>
  <text class="m" x="215" y="452">every rule tagged: gate-enforced / harness / honor</text>

  <path class="flow" d="M 720 396 V 350" stroke="#bc8cff" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text class="s pur" x="732" y="378">measures the delta</text>
  <rect class="b" x="520" y="400" width="400" height="74" stroke-dasharray="6 4"/>
  <text class="t pur" x="720" y="428" font-size="14">drills ×7 · linter in CI</text>
  <text class="m" x="720" y="452">graded traps measure what transferred; sloplint floors any pipeline</text>

  <text class="m" x="560" y="530">distilled from Claude Fable 5’s harness — gates cost 0 context tokens · ‘ls’ isn’t verification · same model, higher floor</text>
</svg>
